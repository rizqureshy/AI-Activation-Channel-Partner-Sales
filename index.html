<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>CRO AI Community</title>
  <meta name="description" content="The front door to the CRO AI Community — learn, share, showcase, ask questions, and experiment with AI. The community wants you." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" as="style"
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap"
        onload="this.onload=null;this.rel='stylesheet'" />
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" /></noscript>

  <link rel="stylesheet" href="assets/css/site.css" />

  <script src="assets/vendor/gsap.min.js"></script>
  <script type="importmap">
  {
    "imports": {
      "three": "./assets/vendor/three/three.module.js",
      "three/addons/": "./assets/vendor/three/addons/"
    }
  }
  </script>
</head>
<body>

  <div id="loader">
    <div class="orb"></div>
    <div class="lbl">Spinning up the community…</div>
  </div>

  <!-- living particle background (dark theme) -->
  <canvas id="bg-canvas"></canvas>
  <!-- ink-in-water smoke background (light theme; started on first switch) -->
  <canvas id="smoke-canvas"></canvas>
  <div class="cosmos-wash"></div>
  <div class="vignette"></div>

  <a class="skip-link" href="#main">Skip to content</a>

  <!-- top navigation (built by site.js) -->
  <header class="topbar" id="topbar">
    <a class="brand" href="#/home" aria-label="CRO AI Community — Home">
      <span class="brand-spark"></span>
      <span class="brand-name">CRO <b>AI</b> Community</span>
    </a>
    <nav class="primary-nav" id="primary-nav" aria-label="Primary"></nav>
    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle light and dark theme" aria-pressed="false" title="Dawn / Dusk">
      <svg class="i-sun" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 8a4 4 0 100 8 4 4 0 000-8zM11 2h2v3h-2zM11 19h2v3h-2zM2 11h3v2H2zM19 11h3v2h-3zM4.2 5.6l1.4-1.4 2 2-1.4 1.4zM16.4 17.8l1.4-1.4 2 2-1.4 1.4zM18.4 4.2l1.4 1.4-2 2-1.4-1.4zM5.6 16.4l1.4 1.4-2 2-1.4-1.4z"/></svg>
      <svg class="i-moon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3a9 9 0 109 9 7 7 0 01-9-9z"/></svg>
    </button>
    <button class="nav-toggle" id="nav-toggle" aria-label="Toggle menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </header>

  <!-- routed content -->
  <main id="main"></main>

  <footer class="site-footer" id="site-footer"></footer>

  <!-- inline video player (embedded playback; never leaves the page) -->
  <div id="player" class="player" aria-hidden="true">
    <button class="player-close" id="player-close" aria-label="Close player" title="Close">&times;</button>
    <div class="player-box"><div class="player-frame" id="player-frame"></div></div>
  </div>

  <!-- toast for demo form submissions -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script type="module" src="assets/js/site.js"></script>
</body>
</html>
